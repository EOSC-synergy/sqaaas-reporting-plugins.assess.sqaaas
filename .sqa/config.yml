      github.com/EOSC-synergy/sqaaas-reporting-plugins cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.sleepy-scarlet-mayfly.sh
        container: qc.met_whiny-green-lion
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.jumpy-rust-havanese.sh
        container: qc.sec_scanty-tan-meerkat
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.skanky-copper-dragon.sh
        container: qc.sty_whiny-taupe-tamarin
      github.com/EOSC-synergy/sqaaas-reporting-plugins jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.baggy-lilac-sheep.sh
        container: qc.sty_sickly-seashell-lemur
