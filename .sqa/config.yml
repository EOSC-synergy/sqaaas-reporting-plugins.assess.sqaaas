      github.com/EOSC-synergy/sqaaas-reporting-plugins get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.wimpy-carmine-capuchin.sh
        container: qc.ver_snappy-grey-reindeer
timeout: 5400
