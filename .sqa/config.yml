        commands:
        - /usr/bin/env sh .sqa/script.shaky-turquoise-worm.sh
        container: qc.sec_sleepy-aquamarine-bonobo
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.hazy-burgundy-wasp.sh
        container: qc.sty_queasy-thistle-sparrow
