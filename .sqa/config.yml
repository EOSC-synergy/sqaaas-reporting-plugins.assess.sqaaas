config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-reporting-plugins:
      branch: 2.2.4
      repo: https://github.com/EOSC-synergy/sqaaas-reporting-plugins
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins git:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-harlequin-terrier.sh
        container: qc.acc_skimpy-goldenrod-wildebeest
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-heliotrope-chimpanzee.sh
        container: qc.doc_chummy-alizarin-rhinoceros
      github.com/EOSC-synergy/sqaaas-reporting-plugins git:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-wheat-cichlid.sh
        container: qc.doc_ready-cyan-schnauzer
      github.com/EOSC-synergy/sqaaas-reporting-plugins markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.woozy-violet-jellyfish.sh
        container: qc.doc_lanky-sapphire-wildebeest
  QC.Lic:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins licensee:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-coral-zebu.sh
        container: qc.lic_snazzy-turquoise-termite
  QC.Met:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-taupe-bear.sh
        container: qc.met_skanky-dandelion-ladybird
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-saffron-bear.sh
        container: qc.sec_scummy-jade-shrimp
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.shaggy-amber-buzzard.sh
        container: qc.sty_crappy-turquoise-birman
      github.com/EOSC-synergy/sqaaas-reporting-plugins jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-carmine-loon.sh
        container: qc.sty_surly-eggplant-nightingale
  QC.Uni:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins pytest:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-black-moose.sh
        container: qc.uni_frumpy-periwinkle-maltese
  QC.Ver:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-corn-capuchin.sh
        container: qc.ver_whiny-violet-barnacle
timeout: 5400
