      github.com/EOSC-synergy/sqaaas-reporting-plugins get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-jade-squirt.sh
        container: qc.ver_whiny-apricot-bison
timeout: 5400
