      github.com/EOSC-synergy/sqaaas-reporting-plugins get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.craggy-sangria-crocodile.sh
        container: qc.ver_skanky-buff-frog
timeout: 5400
