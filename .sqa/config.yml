        commands:
        - /usr/bin/env sh .sqa/script.woolly-pear-zebra.sh
        container: qc.sec_scaly-rust-mandrill
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-carmine-caterpillar.sh
        container: qc.sty_randy-coral-worm
