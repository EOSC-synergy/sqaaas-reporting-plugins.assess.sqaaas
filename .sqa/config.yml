      github.com/EOSC-synergy/sqaaas-reporting-plugins find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.squirrely-pear-llama.sh
        container: qc.doc_cranky-sapphire-kingfisher
      github.com/EOSC-synergy/sqaaas-reporting-plugins git:
        commands:
        - /usr/bin/env sh .sqa/script.paltry-crimson-akbash.sh
