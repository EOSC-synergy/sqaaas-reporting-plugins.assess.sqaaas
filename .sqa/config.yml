        container: qc.sec_paltry-smalt-guppy
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-brass-olm.sh
        container: qc.sty_stuffy-platinum-husky
      github.com/EOSC-synergy/sqaaas-reporting-plugins jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-lilac-sheepdog.sh
