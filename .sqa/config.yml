      github.com/EOSC-synergy/sqaaas-reporting-plugins get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.muggy-black-mongrel.sh
        container: qc.ver_tasty-rose-caterpillar
timeout: 5400
