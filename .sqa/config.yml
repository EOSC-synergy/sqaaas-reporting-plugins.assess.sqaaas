      github.com/EOSC-synergy/sqaaas-reporting-plugins get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-cardinal-cichlid.sh
        container: qc.ver_lumpy-grey-mammoth
