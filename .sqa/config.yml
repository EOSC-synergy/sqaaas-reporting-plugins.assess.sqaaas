  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.tacky-seashell-liger.sh
        container: qc.sty_goopy-brown-hamster
