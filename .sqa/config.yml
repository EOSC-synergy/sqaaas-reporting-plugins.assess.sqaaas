      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-eggplant-sheep.sh
        container: qc.sec_trippy-charcoal-chameleon
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.bumpy-orange-nightingale.sh
        container: qc.sty_squirrely-cerise-newfoundland
