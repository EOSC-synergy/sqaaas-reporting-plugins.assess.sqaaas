        - /usr/bin/env sh .sqa/script.paltry-cerise-chimpanzee.sh
        container: qc.sec_chummy-puce-paradise
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.sickly-indigo-beaver.sh
        container: qc.sty_droopy-mustard-ocelot
