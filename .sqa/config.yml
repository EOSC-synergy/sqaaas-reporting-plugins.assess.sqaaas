        commands:
        - /usr/bin/env sh .sqa/script.tacky-viridian-dane.sh
        container: qc.sec_messy-olive-monster
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-zucchini-dragonfly.sh
        container: qc.sty_grumpy-plum-bloodhound
