      github.com/EOSC-synergy/sqaaas-reporting-plugins cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-blue-jaguar.sh
        container: qc.met_pretty-sepia-wrasse
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.paltry-goldenrod-hummingbird.sh
        container: qc.sec_whiny-tan-baboon
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-cerulean-dunker.sh
        container: qc.sty_sunny-silver-woodlouse
      github.com/EOSC-synergy/sqaaas-reporting-plugins jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-jade-liger.sh
        container: qc.sty_skinny-zucchini-balinese
