      github.com/EOSC-synergy/sqaaas-reporting-plugins cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.squirrely-persimmon-budgerigar.sh
        container: qc.met_wheezy-peach-wrasse
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-cinnabar-salamander.sh
        container: qc.sec_wimpy-rose-millipede
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.homely-pear-kangaroo.sh
        container: qc.sty_hilly-ecru-tapir
      github.com/EOSC-synergy/sqaaas-reporting-plugins jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.randy-myrtle-dragonfly.sh
        container: qc.sty_beady-maroon-bonobo
