      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.pasty-cerise-magpie.sh
        container: qc.sec_chummy-red-gecko
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-lilac-fowl.sh
        container: qc.sty_scaly-linen-mole
      github.com/EOSC-synergy/sqaaas-reporting-plugins jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-platinum-chinchilla.sh
        container: qc.sty_blurry-celadon-dachsbracke
