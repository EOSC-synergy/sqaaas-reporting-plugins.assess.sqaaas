      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-flax-mouse.sh
        container: qc.sec_droopy-orange-salamander
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-orchid-fousek.sh
        container: qc.sty_shaky-persimmon-whale
      github.com/EOSC-synergy/sqaaas-reporting-plugins jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.homely-puce-angora.sh
        container: qc.sty_flimsy-smalt-gorilla
