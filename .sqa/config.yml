        commands:
        - /usr/bin/env sh .sqa/script.gloppy-cobalt-mammoth.sh
        container: qc.sec_stuffy-zucchini-uakari
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.crabby-auburn-monkey.sh
        container: qc.sty_baggy-harlequin-peccary
