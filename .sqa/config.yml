      github.com/EOSC-synergy/sqaaas-reporting-plugins bandit:
        commands:
        - /usr/bin/env sh .sqa/script.ready-apricot-panda.sh
        container: qc.sec_nippy-dandelion-argentino
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-reporting-plugins flake8:
        commands:
        - /usr/bin/env sh .sqa/script.stealthy-cerise-tamarin.sh
        container: qc.sty_craggy-dandelion-booby
