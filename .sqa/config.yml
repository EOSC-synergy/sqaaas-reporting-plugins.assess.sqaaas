      github.com/EOSC-synergy/sqaaas-reporting-plugins find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-firebrick-havanese.sh
        container: qc.doc_homey-lemon-uakari
      github.com/EOSC-synergy/sqaaas-reporting-plugins git:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-beige-indri.sh
        container: qc.doc_hasty-carmine-snake
      github.com/EOSC-synergy/sqaaas-reporting-plugins markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.ready-lime-grasshopper.sh
        container: qc.doc_lanky-blue-warthog
