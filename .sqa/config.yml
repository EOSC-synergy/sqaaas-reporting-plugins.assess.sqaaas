      github.com/EOSC-synergy/sqaaas-reporting-plugins find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.snippy-sangria-sheep.sh
        container: qc.doc_cloudy-olivine-stingray
      github.com/EOSC-synergy/sqaaas-reporting-plugins git:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-bronze-bombay.sh
