      github.com/EOSC-synergy/sqaaas-reporting-plugins find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.crabby-rose-budgerigar.sh
        container: qc.doc_sleazy-brass-mongrel
      github.com/EOSC-synergy/sqaaas-reporting-plugins git:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-turquoise-neanderthal.sh
